<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>AuthX - Creare Cont</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 card p-4 shadow">
                <h2 class="text-center mb-4">Alătură-te echipei AuthX</h2>
                <form action="/register" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email / Username</label>
                        <input type="text" name="username" class="form-control" placeholder="ex: angajat@authx.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Parolă</label>
                        <input type="password" name="password" class="form-control" placeholder="Alege o parolă" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rolul tău</label>
                        <select name="role" class="form-select">
                            <option value="ANALYST">Analyst</option>
                            <option value="MANAGER">Manager</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Înregistrare</button>
                </form>
                <hr>
                <div class="text-center">
                    Ai deja cont? <a href="/login">Autentifică-te aici</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
