<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>AuthX – Recuperare Parolă</title>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow p-4">
                <h4 class="text-center mb-3">🔑 Recuperare Acces</h4>

                <form action="/forgot-password" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="email@authx.com"
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Trimite Token</button>
                </form>

                <hr>

                <div class="text-center small">
                    <a href="/login">← Înapoi la Login</a>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
