<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>AuthX – Login</title>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow p-4">
                <h2 class="text-center mb-1">🔐 AuthX Login</h2>
                <p class="text-center text-muted small mb-3">Compania fictivă "AuthX"</p>

                <div id="errorMsg" class="alert alert-danger d-none"></div>

                <form id="loginForm" action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email / Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-control"
                            placeholder="admin@authx.com"
                            required
                        >
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Parolă</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Autentifică-te</button>
                </form>

                <hr>

                <div class="text-center small">
                    <a href="/register">Creare cont</a>
                    &nbsp;·&nbsp;
                    <a href="/forgot-password">Parolă uitată?</a>
                </div>
            </div>

        </div>
    </div>
</div>
<script src="login.js"></script>
</body>
</html>
